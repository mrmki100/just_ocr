name: just_ocr
description: "Accessible OCR and Document Reader for visually impaired users."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  
  # State Management & Routing
  flutter_riverpod: ^2.6.1
  go_router: ^13.2.0

  # Storage & Database
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  path_provider: ^2.1.6
  shared_preferences: ^2.5.5

  # Document Parsing & OCR
  google_mlkit_text_recognition: ^0.15.1
  google_generative_ai: ^0.4.6
  syncfusion_flutter_pdfviewer: ^33.2.12
  epub_view: ^3.2.0

  # TTS & Audio
  flutter_tts: ^4.2.5

  # Authentication
  google_sign_in: ^6.2.1
  url_launcher: ^6.3.1

  # Utility
  uuid: ^4.5.3
  logger: ^2.7.0
  cupertino_icons: ^1.0.9
  google_mlkit_commons: ^0.11.1
  pdfx: ^2.9.2
  file_selector: ^1.0.3
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  isar_generator: ^3.1.0
  flutter_lints: ^6.0.0
  mockito: ^5.4.4
  test: ^1.25.7

# CRITICAL OVERRIDE: Force google_generative_ai to 0.4.6+ to fix Content.system error
dependency_overrides:
  google_generative_ai: ^0.4.6

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
